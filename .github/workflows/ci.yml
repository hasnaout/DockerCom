name: Docker CI Pipline
on: 
  push: 
    branches: [main]

jobs: 
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
    

      - name: DockerHub login
        uses: docker/login-action@v2
        with:
         username: ${{secrets.DOCKER_USERNAME}}
         password: ${{secrets.DOCKER_PASSWORD}} 
         
      - name: Docker compose build
        run: |
          docker build -t ${{secrets.DOCKER_USERNAME}}/flask-backend:latest ./backend
          docker build -t ${{secrets.DOCKER_USERNAME}}/frontend-app:latest ./frontend

      - name: Docker compose push
        run: |
          docker push ${{secrets.DOCKER_USERNAME}}/flask-backend:latest
          docker push ${{secrets.DOCKER_USERNAME}}/frontend-app:latest
    